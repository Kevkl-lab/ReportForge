name: Build and Package Windows Installer

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build & Package (Windows x64)
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.0'
        arch: 'win64_msvc2022_64'
        modules: 'qtpdf' # Required for Qt6::Pdf and Qt6::PdfWidgets

    - name: Install NSIS
      run: |
        choco install nsis -y

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build Application
      run: |
        cmake --build build --config Release --parallel

    - name: Package with CPack (NSIS)
      run: |
        cpack --config build/CPackConfig.cmake

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReportForge-Windows-Installer
        path: ReportForge-*.exe

    - name: Publish Release Assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ReportForge-*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
